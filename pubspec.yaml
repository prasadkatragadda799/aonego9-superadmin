name: aonego9_superadmin
description: AOneGo9 Super Admin — manages vendors, talent/users, bookings, payments, analytics & CMS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0          # declarative routing (web URLs + mobile)
  provider: ^6.1.2            # lightweight state management
  intl: ^0.19.0              # date / currency formatting
  fl_chart: ^0.68.0          # dashboard & analytics charts
  google_fonts: ^6.2.1        # Fraunces/Syne editorial type (shared w/ user app)

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/
